<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>演示模板标题</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient-bg" aria-hidden="true"></div>

    <div class="reveal">
      <div class="slides">

        <!-- ===== 章节：开场 ===== -->
        <section data-transition="zoom">
          <section data-markdown>
            <textarea data-template>
              **主题标签 · 可替换**

              # 主标题：请在这里写核心主题

              这里是开场摘要，建议 2-4 句，说明这份报告的目标、范围和结论方向。
              <!-- .element: class="lead" -->

              notes: 开场白：30秒介绍主题，然后直接进入章节一。
            </textarea>
          </section>

          <section data-markdown data-state="chapter-cover">
            <textarea data-template>
              ## 开场补充页

              - 要点一：在这页解释本次汇报最重要的问题定义。 <!-- .element: class="fragment fade-up" -->
              - **重点标记**：用 highlight-red 突出关键风险。 <!-- .element: class="fragment highlight-red" data-fragment-index="1" -->
              - grow 动画：让重要结论放大出现。 <!-- .element: class="fragment grow" data-fragment-index="2" -->
              - 要点四：给出章节总览，准备进入正式内容。 <!-- .element: class="fragment fade-up" -->

              notes: 强调 2-3 个核心问题，引出后续章节。
            </textarea>
          </section>
        </section>

        <!-- ===== 章节：内容布局 ===== -->
        <section data-transition="convex">
          <section data-markdown>
            <textarea data-template>
              ## 横向主章节标题

              这是一页章节封面，使用 `convex` 转场。后续使用纵向页深入展开。
              <!-- .element: class="lead" -->
            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              ## 纵向小节 — 双栏布局（内嵌 HTML）

              <div class="two-col">
                <article class="panel fragment fade-right">
                  <h3>左侧观点</h3>
                  <p>在此填写背景、问题、约束和现状信息，建议控制在 4-6 行。</p>
                </article>
                <article class="panel fragment fade-left">
                  <h3>右侧观点</h3>
                  <p>在此填写对照分析、策略建议或落地路径，保持逻辑对应关系。</p>
                </article>
              </div>
            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              ## 卡片网格（内嵌 HTML）

              <div class="cards">
                <article class="card fragment fade-up"><h3>模块 A</h3><p>一句主结论 + 一句解释。</p></article>
                <article class="card fragment highlight-green"><h3>模块 B — highlight-green</h3><p>成功指标或正向结果可用此动画突出。</p></article>
                <article class="card fragment strike"><h3>模块 C — strike</h3><p>用 strike 效果表示已淘汰或不再推荐。</p></article>
                <article class="card fragment fade-up"><h3>模块 D</h3><p>一句主结论 + 一句解释。</p></article>
              </div>
            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              ## Markdown 纯文本示例

              不再需要手写 HTML 标签，用纯 Markdown 即可构建内容页。

              - 支持 **粗体**、*斜体*、`行内代码`
              - 支持无序列表、有序列表
              - 代码块自动语法高亮

              ```python [1,3-4]
              def hello(name):
                  print(f"Hello, {name}!")
                  # 注释行
                  return True
              ```

              > 引用块也原生支持 — 适合放置金句或关键引用。
            </textarea>
          </section>
        </section>

        <!-- ===== 章节：代码与语法高亮 ===== -->
        <section data-transition="slide">
          <section data-markdown>
            <textarea data-template>
              ## 代码与语法高亮

              借助 highlight 插件，代码块自动着色，支持行号高亮和逐步展示。
              <!-- .element: class="lead" -->
            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              ## Python 代码片段

              使用 `data-line-numbers` 高亮指定行：

              ```python [3,5-7]
              import cadquery as cq

              def build_part(width, height, thickness):
                  result = (
                      cq.Workplane("XY")
                      .box(width, height, thickness)
                      .faces(">Z")
                      .circle(width * 0.3)
                      .cutThruAll()
                  )
                  return result

              part = build_part(100, 60, 10)
              cq.exporters.export(part, "output.step")
              ```

              notes: 逐行讲解关键 API：Workplane、box、faces、cutThruAll、exporters.export。注意 STEP 导出的参数配置。
            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              ## 逐步展示代码行

              用 `|` 分隔多个 `data-line-numbers` 步骤：

              ```javascript [1-2|3-4|5-7]
              // 第一步：初始化配置
              const config = { width: 1600, height: 900 };

              // 第二步：创建演示实例
              const deck = new Reveal(config);

              // 第三步：启动，注册事件
              deck.initialize().then(() => {
                console.log("Ready!");
              });
              ```
            </textarea>
          </section>

          <section data-markdown data-state="code-tips">
            <textarea data-template>
              ## 代码展示技巧

              - 用 `data-trim` 自动裁剪代码块前导空白 <!-- .element: class="fragment fade-up" -->
              - 用 `data-line-numbers="1,3-5"` 高亮指定行 <!-- .element: class="fragment highlight-blue" -->
              - 用 `|` 分隔多个步骤实现逐步高亮 <!-- .element: class="fragment fade-up" -->
              - 含 `<` `>` `&` 的代码用 `&lt;` `&gt;` `&amp;` 转义 <!-- .element: class="fragment fade-up" -->
            </textarea>
          </section>
        </section>

        <!-- ===== 章节：交互功能 ===== -->
        <section data-transition="concave">
          <section data-markdown>
            <textarea data-template>
              ## 交互功能演示

              这些功能加载插件后即可使用，无需额外配置。
              <!-- .element: class="lead" -->
            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              ## 快捷键一览

              | 快捷键 | 功能 |
              |--------|------|
              | <kbd>s</kbd> | 打开演讲者备注窗口 <!-- .element: class="fragment fade-up" --> |
              | <kbd>Ctrl+Shift+F</kbd> | 搜索幻灯片内容 <!-- .element: class="fragment fade-up" --> |
              | <kbd>Alt+Click</kbd> | 局部放大（Zoom 插件） <!-- .element: class="fragment fade-up" --> |
              | <kbd>Esc</kbd> | 概览模式 / 退出放大 <!-- .element: class="fragment fade-up" --> |
              | <kbd>f</kbd> | 全屏模式 <!-- .element: class="fragment fade-up" --> |

              notes: 演示时按 s 键打开备注窗口，按 Alt+Click 放大细节。
            </textarea>
          </section>

          <section data-markdown>
            <textarea data-template>
              ## Alt+Click 放大效果

              <div class="two-col">
                <div class="panel fragment zoom-in">
                  <h3>左侧区域</h3>
                  <p>按住 <kbd>Alt</kbd> 键并点击此处，会放大这一区域。适合演示模型细节或数据图表。</p>
                </div>
                <div class="panel fragment zoom-in">
                  <h3>右侧区域</h3>
                  <p>再次 <kbd>Alt+Click</kbd> 另一个区域，会自动缩回并放大新区域。</p>
                </div>
              </div>
            </textarea>
          </section>
        </section>

        <!-- ===== 章节：结束 ===== -->
        <section data-transition="fade">
          <section data-markdown>
            <textarea data-template>
              ## 结束页

              感谢聆听。此处可补充演示说明、后续计划和交流方式。
              <!-- .element: class="lead" -->
            </textarea>
          </section>
        </section>

      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
